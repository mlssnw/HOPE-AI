<!-- CONEXÃO COM O COFRE DE SENHAS LOCAL -->
<script src="config.js"></script>

<!-- BIBLIOTECAS PROFISSIONAIS DE MARKDOWN E HIGHLIGHT -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000507;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Rajdhani', sans-serif;
    cursor: none;
  }

  canvas { position: fixed; inset: 0; }
  #neural { z-index: 1; }
  #glow-canvas { z-index: 2; pointer-events: none; }

  #cursor {
    position: fixed; width: 6px; height: 6px; border-radius: 50%;
    background: rgba(80, 220, 255, 0.95);
    box-shadow: 0 0 14px rgba(80,220,255,0.9), 0 0 30px rgba(80,220,255,0.4);
    pointer-events: none; z-index: 9999; transform: translate(-50%,-50%);
  }

  /* ── OVERLAY UI ── */
  #ui { position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column; pointer-events: none; }

  #topbar { display: flex; align-items: flex-start; justify-content: space-between; padding: 28px 36px 0; }
  .logo-block { display: flex; flex-direction: column; gap: 2px; }
  .logo-main { font-family: 'Orbitron', monospace; font-weight: 900; font-size: 2.4rem; letter-spacing: 0.35em; color: #fff; text-shadow: 0 0 20px rgba(80,220,255,0.9), 0 0 60px rgba(80,220,255,0.4), 0 0 100px rgba(80,220,255,0.15); line-height: 1; }
  .logo-sub { font-family: 'Rajdhani', sans-serif; font-weight: 300; font-size: 0.62rem; letter-spacing: 0.55em; color: rgba(80,220,255,0.5); text-transform: uppercase; padding-left: 3px; }
  .top-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  #clock { font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 400; color: rgba(80,220,255,0.6); letter-spacing: 0.2em; }
  .status-row { display: flex; gap: 16px; font-size: 0.58rem; letter-spacing: 0.18em; color: rgba(80,220,255,0.35); text-transform: uppercase; }
  .status-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #00ffaa; box-shadow: 0 0 8px #00ffaa; margin-right: 5px; vertical-align: middle; animation: blink 2.5s ease-in-out infinite; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  #center-ui { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0; pointer-events: none; }
  #state-label { font-family: 'Orbitron', monospace; font-size: 0.65rem; font-weight: 400; letter-spacing: 0.5em; color: rgba(80,220,255,0.4); text-transform: uppercase; margin-top: 220px; transition: color 0.5s, text-shadow 0.5s; }
  #state-label.speaking { color: rgba(80,220,255,0.9); text-shadow: 0 0 20px rgba(80,220,255,0.6); animation: label-pulse 1s ease-in-out infinite alternate; }
  @keyframes label-pulse { from { opacity:0.7; } to { opacity:1; } }

  #soundbars { display: flex; align-items: center; justify-content: center; gap: 4px; height: 56px; margin-top: 18px; opacity: 0; transition: opacity 0.4s; }
  #soundbars.active { opacity: 1; }
  .bar { width: 4px; border-radius: 4px; background: linear-gradient(180deg, #50dcff 0%, rgba(80,220,255,0.3) 100%); box-shadow: 0 0 8px rgba(80,220,255,0.6); animation: none; height: 4px; transition: height 0.1s ease; }

  #bottom { padding: 0 36px 28px; display: flex; flex-direction: column; gap: 14px; pointer-events: all; }
  #node-info { align-self: center; padding: 7px 18px; background: rgba(0,0,0,0.6); border: 1px solid rgba(80,220,255,0.2); border-radius: 2px; font-size: 0.68rem; letter-spacing: 0.15em; color: rgba(80,220,255,0.6); backdrop-filter: blur(8px); opacity: 0; transition: opacity 0.3s; pointer-events: none; min-height: 28px; text-align: center; }
  #node-info.visible { opacity: 1; }

  #input-row { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.55); border: 1px solid rgba(80,220,255,0.18); border-radius: 3px; padding: 10px 16px; backdrop-filter: blur(16px); }
  #input-row:focus-within { border-color: rgba(80,220,255,0.45); box-shadow: 0 0 20px rgba(80,220,255,0.08); }
  #prompt-prefix { font-family: 'Orbitron', monospace; font-size: 0.7rem; color: rgba(80,220,255,0.5); flex-shrink: 0; letter-spacing: 0.1em; }
  #text-input { flex: 1; background: transparent; border: none; outline: none; font-family: 'Rajdhani', sans-serif; font-size: 0.95rem; font-weight: 400; letter-spacing: 0.08em; color: rgba(255,255,255,0.85); caret-color: #50dcff; }
  #text-input::placeholder { color: rgba(80,220,255,0.25); font-weight: 300; }

  .icon-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(80,220,255,0.2); border-radius: 2px; background: rgba(80,220,255,0.05); cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
  .icon-btn:hover { background: rgba(80,220,255,0.15); border-color: rgba(80,220,255,0.5); box-shadow: 0 0 14px rgba(80,220,255,0.2); }
  .icon-btn svg { width: 14px; height: 14px; stroke: rgba(80,220,255,0.7); fill: none; stroke-width: 1.5; }
  #mic-btn.listening { background: rgba(80,220,255,0.2); border-color: #50dcff; box-shadow: 0 0 20px rgba(80,220,255,0.35); }
  #mic-btn.listening svg { stroke: #50dcff; }

  /* ── HISTÓRICO DE MENSAGENS ── */
  #chat-history { display: flex; flex-direction: column; gap: 10px; max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
  #chat-history.has-messages { max-height: 320px; overflow-y: auto; }
  #chat-history::-webkit-scrollbar { width: 3px; }
  #chat-history::-webkit-scrollbar-thumb { background: rgba(80,220,255,0.2); border-radius: 2px; }

  .msg-bubble { padding: 8px 14px; border-radius: 3px; font-size: 0.78rem; line-height: 1.6; letter-spacing: 0.03em; max-width: 88%; }
  .msg-user { align-self: flex-end; background: rgba(80,220,255,0.08); border: 1px solid rgba(80,220,255,0.2); color: rgba(200,240,255,0.7); border-bottom-right-radius: 0; }
  .msg-hope { align-self: flex-start; background: rgba(0,0,0,0.3); border: 1px solid rgba(80,220,255,0.1); border-left: 2px solid rgba(80,220,255,0.4); color: rgba(200,240,255,0.85); border-bottom-left-radius: 0; }
  .msg-meta { font-size: 0.55rem; letter-spacing: 0.15em; color: rgba(80,220,255,0.3); margin-bottom: 3px; text-transform: uppercase; }
  .msg-wrapper { display: flex; flex-direction: column; }
  .msg-wrapper.user { align-items: flex-end; }
  .msg-wrapper.hope { align-items: flex-start; }

  /* ── CAIXA RICA (MARKED.JS) ── */
  #response-box {
    background: rgba(0,0,0,0.55); border: 1px solid rgba(80,220,255,0.12); border-left: 2px solid #50dcff;
    border-radius: 3px; padding: 18px 22px; font-size: 0.88rem; line-height: 1.7; color: rgba(200,240,255,0.9);
    backdrop-filter: blur(12px); min-height: 48px; max-height: 400px; overflow-y: auto; opacity: 0;
    transform: translateY(4px); transition: opacity 0.4s, transform 0.4s; font-family: 'Rajdhani', sans-serif;
  }
  #response-box::-webkit-scrollbar { width: 4px; }
  #response-box::-webkit-scrollbar-thumb { background: rgba(80,220,255,0.3); border-radius: 2px; }
  #response-box.visible { opacity: 1; transform: translateY(0); }

  /* Estilos injetados pelo Marked.js */
  #response-box p { margin-bottom: 1em; }
  #response-box strong { color: #fff; font-weight: 600; text-shadow: 0 0 10px rgba(80,220,255,0.3); }
  #response-box ul, #response-box ol { margin-left: 1.5em; margin-bottom: 1em; }
  #response-box li { margin-bottom: 0.4em; }
  #response-box h1, #response-box h2, #response-box h3 { font-family: 'Orbitron', monospace; color: #50dcff; margin: 1em 0 0.5em; }
  
  /* Tabelas Premium */
  #response-box table { width: 100%; border-collapse: collapse; margin: 1em 0; font-size: 0.82rem; }
  #response-box th { background: rgba(80,220,255,0.15); color: #50dcff; padding: 10px; text-align: left; font-family: 'Orbitron', monospace; letter-spacing: 0.1em; border: 1px solid rgba(80,220,255,0.3); }
  #response-box td { padding: 10px; border: 1px solid rgba(80,220,255,0.15); background: rgba(0,0,0,0.3); }
  #response-box tr:hover td { background: rgba(80,220,255,0.08); }

  /* Código */
  #response-box code { font-family: Consolas, monospace; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; color: #ff79c6; font-size: 0.85em; }
  #response-box pre { background: #1e1e1e; border: 1px solid rgba(80,220,255,0.2); padding: 12px; border-radius: 6px; overflow-x: auto; margin: 1em 0; }
  #response-box pre code { background: transparent; padding: 0; color: inherit; font-size: 0.8rem; }

  .typing-cursor { display: inline-block; width: 2px; height: 14px; background: #50dcff; margin-left: 2px; animation: blink-cursor 0.7s steps(1) infinite; }
  @keyframes blink-cursor { 0%,100% { opacity:1; } 50% { opacity:0; } }

  .bracket { position: fixed; width: 22px; height: 22px; z-index: 15; pointer-events: none; }
  .bracket::before, .bracket::after { content: ''; position: absolute; background: rgba(80,220,255,0.5); }
  .bracket::before { width: 2px; height: 100%; } .bracket::after { height: 2px; width: 100%; }
  .bracket.tl { top: 16px; left: 16px; } .bracket.tr { top: 16px; right: 16px; transform: scaleX(-1); }
  .bracket.bl { bottom: 16px; left: 16px; transform: scaleY(-1); } .bracket.br { bottom: 16px; right: 16px; transform: scale(-1); }
</style>

<body>

<div id="cursor"></div>
<canvas id="neural"></canvas>
<canvas id="glow-canvas"></canvas>

<div class="bracket tl"></div><div class="bracket tr"></div><div class="bracket bl"></div><div class="bracket br"></div>

<div id="ui">
  <div id="topbar">
    <div class="logo-block">
      <div class="logo-main">H O P E</div>
      <div class="logo-sub">Holistic Operational Personal Engine</div>
    </div>
    <div class="top-right">
      <div id="clock">00:00:00</div>
      <div class="status-row">
        <span><span class="status-dot"></span>NEURAL CORE</span>
        <span><span class="status-dot"></span>VAULT SYNC</span>
        <span><span class="status-dot"></span>ONLINE</span>
      </div>
    </div>
  </div>

  <div id="center-ui">
    <div id="state-label">AGUARDANDO</div>
    <div id="soundbars"></div>
  </div>

  <div id="bottom">
    <div id="node-info"></div>
    <div id="chat-history"></div>
    <div id="response-box"></div>
    <div id="input-row">
      <div id="prompt-prefix">HOPE /&gt;</div>
      <input id="text-input" type="text" placeholder="fale ou escreva algo (use 'pesquise' para buscar na web)..." autocomplete="off" spellcheck="false" />
      
      <button class="icon-btn" id="sound-toggle-btn" title="Ativar/Desativar Voz">
        <svg id="sound-icon" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.25 9.75L19.5 12m0 0l2.25 2.25M19.5 12l2.25-2.25M19.5 12l-2.25 2.25m-10.5-6l4.72-4.72a.75.75 0 011.28.531V19.69a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.506-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.395C2.806 8.757 3.63 8.25 4.51 8.25H6.75z"/></svg>
      </button>
      <button class="icon-btn" id="mic-btn" title="Falar">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/></svg>
      </button>
      <button class="icon-btn" id="send-btn" title="Enviar">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
// CONFIGURAÇÃO DO MARKED.JS COM HIGHLIGHT
if (typeof marked !== 'undefined' && typeof hljs !== 'undefined') {
  marked.setOptions({
    highlight: function(code, lang) {
      const language = hljs.getLanguage(lang) ? lang : 'plaintext';
      return hljs.highlight(code, { language }).value;
    },
    breaks: true
  });
}

// CURSOR E RELÓGIO
const cursorEl = document.getElementById('cursor');
window.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px'; cursorEl.style.top = e.clientY + 'px';
});
setInterval(() => document.getElementById('clock').textContent = new Date().toTimeString().slice(0,8), 1000);

// NÓS DA REDE NEURAL (2.5D Atual)
const canvas = document.getElementById('neural'); const ctx = canvas.getContext('2d');
const glowCanvas = document.getElementById('glow-canvas'); const gCtx = glowCanvas.getContext('2d');
let W, H, CX, CY, nodes = [], connections = [], pulses = [], speaking = false, speakIntensity = 0;

function resize() { W = canvas.width = glowCanvas.width = window.innerWidth; H = canvas.height = glowCanvas.height = window.innerHeight; CX = W / 2; CY = H / 2; buildNodes(); }
const NOTE_LABELS = ['projetos', 'ia/llm', 'reuniões', 'tarefas', 'ideias', 'código', 'pesquisa', 'saúde', 'finanças', 'leituras', 'jarvis', 'automações', 'diário', 'metas', 'contatos'];

function buildNodes() {
  nodes = [{ id: 0, x: CX, y: CY, r: 18, isCore: true, label: 'HOPE', phase: 0, angle: 0, baseR: 0, angularV: 0 }];
  for (let i = 0; i < NOTE_LABELS.length; i++) {
    const r = (i < 7 ? 140 : 240) + (Math.random() - 0.5) * 60;
    const angle = (i / NOTE_LABELS.length) * Math.PI * 2;
    nodes.push({ id: i + 1, x: CX + Math.cos(angle) * r, y: CY + Math.sin(angle) * r, r: 4 + Math.random() * 4, baseR: r, angle, angularV: (Math.random() - 0.5) * 0.001, isCore: false, label: NOTE_LABELS[i], phase: Math.random() * Math.PI * 2 });
    connections.push({ a: 0, b: i + 1, strength: 0.6 });
  }
}
let frame = 0;
function animate() {
  requestAnimationFrame(animate); frame++;
  ctx.clearRect(0, 0, W, H); gCtx.clearRect(0, 0, W, H);
  nodes.forEach(n => {
    n.angle += n.angularV + (speaking ? n.angularV * speakIntensity * 2 : 0);
    n.x = CX + Math.cos(n.angle) * n.baseR * (speaking ? 1 + speakIntensity * 0.3 : 1);
    n.y = CY + Math.sin(n.angle) * n.baseR * (speaking ? 1 + speakIntensity * 0.3 : 1);
  });
  connections.forEach(c => {
    ctx.beginPath(); ctx.moveTo(nodes[c.a].x, nodes[c.a].y); ctx.lineTo(nodes[c.b].x, nodes[c.b].y);
    ctx.strokeStyle = `rgba(60,180,220,${c.strength * 0.35})`; ctx.stroke();
  });
  nodes.forEach(n => {
    const pulse = Math.sin(frame * 0.008 * 1.8 + n.phase) * 0.5 + 0.5;
    ctx.beginPath(); ctx.arc(n.x, n.y, n.r * (1 + pulse * 0.2), 0, Math.PI * 2);
    ctx.fillStyle = n.isCore ? '#50dcff' : `rgba(120,220,255,${0.4 + pulse * 0.6})`; ctx.fill();
  });
  if (!speaking && speakIntensity > 0) speakIntensity = Math.max(0, speakIntensity - 0.02);
}
resize(); window.addEventListener('resize', resize); animate();

// UI E INTERAÇÕES
const stateLabel = document.getElementById('state-label'), responseBox = document.getElementById('response-box'), chatHistory = document.getElementById('chat-history'), textInput = document.getElementById('text-input'), sendBtn = document.getElementById('send-btn'), soundToggleBtn = document.getElementById('sound-toggle-btn');
let voiceEnabled = false, conversationHistory = [];

function setSpeaking(val) {
  speaking = val;
  if (val) { speakIntensity = 0.8; stateLabel.textContent = 'FALANDO'; stateLabel.classList.add('speaking'); } 
  else { stateLabel.textContent = 'AGUARDANDO'; stateLabel.classList.remove('speaking'); }
}

soundToggleBtn.addEventListener('click', () => {
  voiceEnabled = !voiceEnabled;
  soundToggleBtn.style.borderColor = voiceEnabled ? '#50dcff' : 'rgba(80,220,255,0.2)';
  soundToggleBtn.style.boxShadow = voiceEnabled ? '0 0 14px rgba(80,220,255,0.4)' : 'none';
});

function addToHistory(role, text) {
  const wrapper = document.createElement('div'); wrapper.className = `msg-wrapper ${role}`;
  wrapper.innerHTML = `<div class="msg-meta">${role === 'user' ? 'VOCÊ' : 'HOPE'}</div><div class="msg-bubble msg-${role}">${text.length > 80 ? text.slice(0, 80) + '...' : text}</div>`;
  chatHistory.appendChild(wrapper); chatHistory.classList.add('has-messages'); chatHistory.scrollTop = chatHistory.scrollHeight;
}

// O RENDERIZADOR PODEROSO DE MARKDOWN
function typeResponse(text) {
  responseBox.classList.add('visible');
  
  if (typeof marked !== 'undefined') {
    responseBox.innerHTML = marked.parse(text);
  } else {
    responseBox.textContent = text;
  }
  
  responseBox.scrollTop = 0;
  
  if (voiceEnabled) {
    const cleanText = text.replace(/\x60{3}[\s\S]*?\x60{3}/g, 'Bloco de código ignorado na leitura.').replace(/[#*|]/g,'').trim();
    speakText(cleanText);
  }
}

// ELEVENLABS E CLAUDE (PUXANDO DO COFRE DE CONFIG)
async function speakText(text) {
  setSpeaking(true);
  const apiKey = (typeof ENV !== 'undefined') ? ENV.ELEVENLABS_API_KEY : ''; 
  if (!apiKey) { setSpeaking(false); return; }
  try {
    const r = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/OYTbf65OHHFELVut7v2H`, {
      method: 'POST', headers: { 'Accept': 'audio/mpeg', 'xi-api-key': apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, model_id: 'eleven_multilingual_v2', voice_settings: { stability: 0.5, similarity_boost: 0.75 } })
    });
    const audio = new Audio(URL.createObjectURL(await r.blob()));
    audio.onended = () => setSpeaking(false); audio.play();
  } catch (e) { setSpeaking(false); }
}

async function readObsidianNote(noteName) {
  const obsidianKey = (typeof ENV !== 'undefined') ? ENV.OBSIDIAN_KEY : '';
  if (!obsidianKey) return null;
  try {
    const response = await fetch('http://127.0.0.1:27123/vault/' + noteName + '.md', {
      headers: { 'Authorization': 'Bearer ' + obsidianKey, 'Accept': 'text/markdown' }
    });
    if (!response.ok) throw new Error('Nota não encontrada');
    return await response.text();
  } catch (e) {
    console.error('Obsidian:', e);
    return null;
  }
}

// ═══════════════════════════════════════════════
// MÓDULO DE INTERNET (TAVILY SEARCH)
// ═══════════════════════════════════════════════
async function searchWeb(query) {
  const apiKey = (typeof ENV !== 'undefined') ? ENV.TAVILY_API_KEY : '';
  if (!apiKey) return "Erro: Chave da Tavily não configurada.";

  try {
    const response = await fetch('https://api.tavily.com/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        api_key: apiKey,
        query: query,
        search_depth: "basic",
        include_answer: false
      })
    });
    
    if (!response.ok) throw new Error('Falha na busca web');
    const data = await response.json();
    
    let dossier = data.results.slice(0, 3).map(r => `FONTE: ${r.title} (${r.url})\nDADOS: ${r.content}`).join('\n\n---\n\n');
    return dossier;
    
  } catch (e) {
    console.error('Tavily:', e);
    return "Falha ao acessar os servidores externos da internet.";
  }
}

async function askClaude(userMessage, isEnrichedContext = false) {
  const claudeKey = (typeof ENV !== 'undefined') ? ENV.CLAUDE_API_KEY : '';
  if (!claudeKey) return 'Erro: Chave do Claude não encontrada no config.js';

  // Se o contexto já foi enriquecido pela busca da web, não usamos o histórico direto para não confundir o modelo
  const apiMessages = isEnrichedContext 
    ? [{ role: 'user', content: userMessage }]
    : conversationHistory.slice(-20).concat([{ role: 'user', content: userMessage }]);

  try {
    let systemContext = await readObsidianNote('Hope/Hope_personalidade') || "Você é Hope. Use tabelas em markdown sempre que listar dados.";
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': claudeKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1024, system: systemContext, messages: apiMessages })
    });
    const data = await r.json(); return data.content[0].text;
  } catch (e) { return 'Erro de conexão com o Claude.'; }
}

// PROCESSAMENTO CENTRAL E GATILHOS
async function handleSend() {
  const txt = textInput.value.trim(); if (!txt) return;
  textInput.value = ''; addToHistory('user', txt);
  stateLabel.textContent = 'PROCESSANDO'; stateLabel.classList.add('speaking');
  responseBox.innerHTML = ''; setSpeaking(false);

  let reply = '';
  const comando = txt.toLowerCase();

  if (comando === 'fale' || comando === 'ativar voz') {
    voiceEnabled = true;
    soundToggleBtn.style.borderColor = '#50dcff';
    soundToggleBtn.style.boxShadow = '0 0 14px rgba(80,220,255,0.4)';
    reply = 'Módulo de voz ativado. Pronta para falar.';

  } else if (comando === 'silêncio' || comando === 'desativar voz') {
    voiceEnabled = false;
    soundToggleBtn.style.borderColor = 'rgba(80,220,255,0.2)';
    soundToggleBtn.style.boxShadow = 'none';
    reply = 'Módulo de voz desativado. Respondendo apenas via texto.';

  } else if (comando.includes('ler hub') || comando.includes('leia hub')) {
    const conteudo = await readObsidianNote('Hope/Hope_Hub');
    reply = conteudo ? 'Acessando o Hub:\n\n' + conteudo.substring(0, 300) + '...' : 'Erro ao acessar o cofre local.';

  } else if (comando.startsWith('pesquise ') || comando.startsWith('/web ')) {
    // 🌐 GATILHO DA INTERNET
    const termoBusca = txt.replace('/web', '').replace(/pesquise/i, '').trim();
    
    stateLabel.textContent = 'RASTREANDO WEB...'; 
    const dadosDaWeb = await searchWeb(termoBusca);
    
    const promptEnriquecido = `O usuário fez a seguinte pergunta: "${termoBusca}".\n\nEu fiz uma busca em tempo real na internet e encontrei estes dados recentes:\n\n${dadosDaWeb}\n\nCom base exclusivamente nesses dados recentes, responda à pergunta do usuário de forma concisa e amigável.`;
    
    stateLabel.textContent = 'SINTETIZANDO...';
    reply = await askClaude(promptEnriquecido, true);

  } else {
    // RAG PADRÃO
    reply = await askClaude(txt);
  }

  conversationHistory.push({ role: 'user', content: txt }, { role: 'assistant', content: reply });
  stateLabel.classList.remove('speaking');
  typeResponse(reply);
}

sendBtn.addEventListener('click', handleSend);
textInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

setTimeout(() => typeResponse('**Sistemas Protegidos.** Módulo Web ativado. Para buscas em tempo real, inicie a frase com **"pesquise..."**.'), 1000);
</script>
